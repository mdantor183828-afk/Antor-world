canvas { position:fixed; top:0; left:0; z-index:-1; }
.container {

.logo {
    width: 110px; height: 110px; margin: auto;

    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 0 20px #ff0000; animation: pulse 1s infinite alternate;

    width: 100%; height: 100%; object-fit: cover; /* ছবিটা ঠিকমতো ফিট করার জন্য */
}

    box-shadow: 0 0 15px red; text-transform: uppercase;
}
.status { margin-top: 15px; display: flex; justify-content: space-around; font-size: 18px; font-weight: bold; }
#log-box {
    margin-top: 15px; font-size: 10px; color: #0f0; height: 100px;

// Matrix Effect
const canvas = document.getElementById('matrix');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth; canvas.height = window.innerHeight;
const drops = [];
for (let x = 0; x < canvas.width/15; x++) drops[x] = 1;

function draw() {
    ctx.fillStyle = "rgba(0, 0, 0, 0.1)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.font = "15px monospace";
    for (let i = 0; i < drops.length; i++) {
        const text = Math.random() > 0.8 ? "☠️" : "1";
        ctx.fillStyle = text === "☠️" ? "red" : "#003300";
        ctx.fillText(text, i * 15, drops[i] * 15);
        if (drops[i] * 15 > canvas.height && Math.random() > 0.975) drops[i] = 0;
        drops[i]++;
    }
}
setInterval(draw, 50);
