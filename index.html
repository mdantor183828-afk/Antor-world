<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANTOR.WORLD</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; min-height: 100vh; color: #fff; background: linear-gradient(-45deg, #0d0221, #1a0533, #0a1628, #001a1a, #1a0010); background-size: 400% 400%; animation: gradientBG 10s ease infinite; }
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        .orb { position: fixed; border-radius: 50%; filter: blur(80px); opacity: 0.25; pointer-events: none; z-index: 0; animation: float 8s ease-in-out infinite; }
        .orb1 { width: 400px; height: 400px; background: #ff00ff; top: -100px; left: -100px; }
        .orb2 { width: 300px; height: 300px; background: #00ffff; bottom: -100px; right: -50px; animation-delay: 3s; }
        .orb3 { width: 250px; height: 250px; background: #ff6600; top: 50%; left: 50%; animation-delay: 5s; }
        @keyframes float { 0%, 100% { transform: translate(0,0) scale(1); } 33% { transform: translate(30px,-30px) scale(1.1); } 66% { transform: translate(-20px,20px) scale(0.9); } }
        nav { position: sticky; top: 0; z-index: 100; display: flex; justify-content: space-between; align-items: center; padding: 15px 25px; background: rgba(0,0,0,0.4); backdrop-filter: blur(15px); border-bottom: 1px solid rgba(255,255,255,0.1); flex-wrap: wrap; gap: 10px; }
        .nav-logo { font-size: 20px; font-weight: bold; letter-spacing: 4px; background: linear-gradient(90deg, #ff00ff, #00ffff, #ff6600); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .nav-links a { color: rgba(255,255,255,0.7); text-decoration: none; margin-left: 15px; font-size: 13px; }
        .cart-btn { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.3); color: #fff; padding: 8px 15px; font-size: 13px; cursor: pointer; border-radius: 20px; }
        .hero { position: relative; z-index: 1; text-align: center; padding: 60px 20px; }
        .hero h1 { font-size: 42px; letter-spacing: 6px; font-weight: 900; background: linear-gradient(90deg, #ff00ff, #00ffff, #ff6600, #ff00ff); background-size: 300%; -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; animation: textFlow 4s linear infinite; }
        @keyframes textFlow { 0% { background-position: 0%; } 100% { background-position: 300%; } }
        .hero p { color: rgba(255,255,255,0.6); letter-spacing: 3px; margin-top: 10px; font-size: 13px; }
        .search-bar { position: relative; z-index: 1; display: flex; justify-content: center; padding: 20px; gap: 10px; flex-wrap: wrap; }
        .search-bar input { width: 280px; padding: 12px 18px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 25px; color: #fff; font-size: 13px; outline: none; }
        .search-bar input::placeholder { color: rgba(255,255,255,0.4); }
        .search-bar input:focus { border-color: #ff00ff; }
        .search-bar button { padding: 12px 22px; background: linear-gradient(135deg, #ff00ff, #00ffff); border: none; color: #000; font-weight: bold; font-size: 13px; cursor: pointer; border-radius: 25px; }
        .section-title { position: relative; z-index: 1; text-align: center; font-size: 16px; letter-spacing: 5px; color: rgba(255,255,255,0.8); margin: 10px 0 20px; text-transform: uppercase; }
        .products { position: relative; z-index: 1; display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; padding: 10px 20px 50px; max-width: 1200px; margin: 0 auto; }
        .product-card { background: rgba(255,255,255,0.07); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.15); border-radius: 16px; overflow: hidden; transition: all 0.3s; }
        .product-card:hover { border-color: rgba(255,0,255,0.5); box-shadow: 0 8px 32px rgba(255,0,255,0.2); transform: translateY(-5px); }
        .product-img { width: 100%; height: 180px; object-fit: cover; display: block; }
        .product-img-placeholder { width: 100%; height: 180px; background: rgba(255,255,255,0.05); display: flex; align-items: center; justify-content: center; font-size: 55px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .product-info { padding: 15px; }
        .product-name { font-size: 14px; font-weight: bold; margin-bottom: 6px; color: #fff; }
        .product-desc { font-size: 11px; color: rgba(255,255,255,0.5); margin-bottom: 10px; line-height: 1.6; }
        .product-price { font-size: 20px; font-weight: bold; margin-bottom: 12px; background: linear-gradient(90deg, #ff00ff, #00ffff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .btn-group { display: flex; gap: 8px; }
        .buy-btn { flex: 1; padding: 9px; background: linear-gradient(135deg, #ff00ff, #00ffff); border: none; color: #000; font-weight: bold; font-size: 12px; cursor: pointer; border-radius: 8px; }
        .order-now-btn { flex: 1; padding: 9px; background: linear-gradient(135deg, #ff6600, #ff0000); border: none; color: #fff; font-weight: bold; font-size: 12px; cursor: pointer; border-radius: 8px; }
        .del-btn { padding: 9px 12px; background: rgba(255,50,50,0.2); border: 1px solid rgba(255,50,50,0.4); color: #ff5555; font-size: 14px; cursor: pointer; border-radius: 8px; }
        .del-btn:hover { background: #ff3333; color: #fff; }
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.75); z-index: 200; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .modal-overlay.active { display: flex; }
        .modal-box { background: rgba(10,0,30,0.97); border: 1px solid rgba(255,0,255,0.4); box-shadow: 0 0 40px rgba(255,0,255,0.2); border-radius: 16px; padding: 25px; width: 92%; max-width: 440px; max-height: 90vh; overflow-y: auto; }
        .modal-box h2 { letter-spacing: 3px; margin-bottom: 5px; font-size: 16px; }
        .modal-subtitle { font-size: 12px; color: rgba(255,255,255,0.5); margin-bottom: 18px; }
        .close-btn { float: right; background: none; border: none; color: #ff5555; font-size: 22px; cursor: pointer; }
        .order-summary { background: rgba(255,255,255,0.05); border-radius: 10px; padding: 12px; margin-bottom: 18px; }
        .order-item-row { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid rgba(255,255,255,0.06); font-size: 13px; }
        .order-total { font-size: 16px; font-weight: bold; text-align: right; margin-top: 10px; background: linear-gradient(90deg, #ff00ff, #00ffff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .oform-group { margin-bottom: 14px; }
        .oform-group label { display: block; font-size: 11px; color: rgba(255,255,255,0.6); letter-spacing: 2px; margin-bottom: 6px; text-transform: uppercase; }
        .oform-group input, .oform-group textarea { width: 100%; padding: 10px 12px; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); border-radius: 8px; color: #fff; font-size: 13px; outline: none; resize: vertical; }
        .oform-group input:focus, .oform-group textarea:focus { border-color: #ff00ff; }
        .oform-group input::placeholder, .oform-group textarea::placeholder { color: rgba(255,255,255,0.3); }
        .order-btns { display: flex; flex-direction: column; gap: 10px; margin-top: 15px; }
        .whatsapp-btn { width: 100%; padding: 13px; background: linear-gradient(135deg, #25D366, #128C7E); border: none; color: #fff; font-weight: bold; font-size: 14px; cursor: pointer; border-radius: 10px; }
        .email-btn { width: 100%; padding: 13px; background: linear-gradient(135deg, #ff00ff, #9900ff); border: none; color: #fff; font-weight: bold; font-size: 14px; cursor: pointer; border-radius: 10px; }
        .cart-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.1); font-size: 12px; }
        .cart-item .remove { background: none; border: 1px solid #ff5555; color: #ff5555; cursor: pointer; padding: 3px 8px; font-size: 11px; border-radius: 5px; }
        .cart-total-bar { margin-top: 15px; font-size: 16px; text-align: right; background: linear-gradient(90deg, #ff00ff, #00ffff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; font-weight: bold; }
        .checkout-btn { width: 100%; margin-top: 15px; padding: 13px; background: linear-gradient(135deg, #ff00ff, #00ffff); border: none; color: #000; font-weight: bold; font-size: 13px; cursor: pointer; border-radius: 10px; }
        .add-section { position: relative; z-index: 1; max-width: 580px; margin: 0 auto 50px; padding: 0 20px; }
        .add-form { background: rgba(255,255,255,0.07); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.15); border-radius: 16px; padding: 25px; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 11px; color: rgba(255,255,255,0.6); letter-spacing: 2px; margin-bottom: 6px; text-transform: uppercase; }
        .form-group input, .form-group textarea { width: 100%; padding: 10px 12px; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); border-radius: 8px; color: #fff; font-size: 13px; outline: none; resize: vertical; }
        .form-group input::placeholder, .form-group textarea::placeholder { color: rgba(255,255,255,0.3); }
        .add-btn { width: 100%; padding: 12px; background: linear-gradient(135deg, #ff00ff, #00ffff); border: none; color: #000; font-weight: bold; font-size: 13px; cursor: pointer; border-radius: 10px; text-transform: uppercase; }
        .contact-section { position: relative; z-index: 1; text-align: center; padding: 20px; margin-bottom: 30px; }
        .contact-links { display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; margin-top: 15px; }
        .contact-link { padding: 10px 20px; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.2); border-radius: 25px; color: #fff; text-decoration: none; font-size: 13px; transition: all 0.3s; }
        .contact-link:hover { background: rgba(255,0,255,0.2); border-color: #ff00ff; }
        .admin-bar { position: relative; z-index: 1; text-align: center; padding: 15px; }
        .admin-login-btn { padding: 10px 25px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.15); border-radius: 20px; color: rgba(255,255,255,0.4); font-size: 12px; cursor: pointer; transition: all 0.3s; }
        .admin-login-btn:hover { border-color: #ff00ff; color: #fff; }
        .admin-badge { display: inline-block; padding: 6px 18px; background: rgba(255,0,255,0.15); border: 1px solid #ff00ff; border-radius: 20px; color: #ff00ff; font-size: 13px; margin-right: 10px; }
        .logout-btn { padding: 6px 15px; background: rgba(255,50,50,0.2); border: 1px solid #ff5555; border-radius: 15px; color: #ff5555; font-size: 12px; cursor: pointer; }
        .footer { position: relative; z-index: 1; text-align: center; padding: 20px; border-top: 1px solid rgba(255,255,255,0.1); font-size: 11px; color: rgba(255,255,255,0.4); letter-spacing: 2px; }
    </style>
</head>
<body>
<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="orb orb3"></div>
<nav>
    <div class="nav-logo">🌍 ANTOR.WORLD</div>
    <div class="nav-links">
        <a href="#">Home</a>
        <a href="#products">Products</a>
        <a href="#contact">Contact</a>
    </div>
    <button class="cart-btn" onclick="openCart()">🛒 CART (<span id="cartCount">0</span>)</button>
</nav>
<div class="hero">
    <h1>ANTOR.WORLD</h1>
    <p>✨ PREMIUM PRODUCTS | FAST DELIVERY | SECURE PAYMENT</p>
</div>
<div class="search-bar">
    <input type="text" id="searchInput" placeholder="Search products..." oninput="searchProducts()">
    <button onclick="searchProducts()">Search</button>
</div>
<div class="section-title" id="products">⚡ Products</div>
<div class="products" id="productGrid"></div>
<div class="add-section" id="addSection" style="display:none">
    <div class="section-title">➕ Add New Product</div>
    <div class="add-form">
        <div class="form-row">
            <div class="form-group">
                <label>Product Name</label>
                <input type="text" id="pName" placeholder="Product name...">
            </div>
            <div class="form-group">
                <label>Price (TK)</label>
                <input type="number" id="pPrice" placeholder="0">
            </div>
        </div>
        <div class="form-group">
            <label>Description</label>
            <textarea id="pDesc" rows="3" placeholder="Product description..."></textarea>
        </div>
        <div class="form-group">
            <label>Image URL</label>
            <input type="text" id="pImg" placeholder="https://i.ibb.co/xxx/photo.jpg">
        </div>
        <div class="form-group">
            <label>Emoji</label>
            <input type="text" id="pEmoji" placeholder="📦">
        </div>
        <button class="add-btn" onclick="addProduct()">➕ Add Product</button>
    </div>
</div>
<div class="contact-section" id="contact">
    <div class="section-title">📞 Contact</div>
    <div class="contact-links">
        <a href="tel:+8801948082008" class="contact-link">📞 01948082008</a>
        <a href="https://www.facebook.com/md.antor.16718979?mibextid=ZbWKwL" class="contact-link" target="_blank">📘 Facebook</a>
        <a href="https://wa.me/8801948082008" class="contact-link" target="_blank">💬 WhatsApp</a>
    </div>
</div>
<div class="admin-bar" id="adminBar">
    <button class="admin-login-btn" onclick="showAdminLogin()">🔐 Admin Login</button>
</div>
<div class="footer">© 2024 ANTOR.WORLD | ALL RIGHTS RESERVED</div>
<!-- ADMIN MODAL -->
<div class="modal-overlay" id="adminModal">
    <div class="modal-box" style="max-width:340px">
        <button class="close-btn" onclick="closeAdminModal()">✕</button>
        <h2>🔐 Admin Login</h2>
        <p class="modal-subtitle">Password দাও</p>
        <div class="oform-group">
            <label>Password</label>
            <input type="password" id="adminPass" placeholder="Password..." onkeydown="if(event.key==='Enter')checkAdmin()">
        </div>
        <button class="checkout-btn" onclick="checkAdmin()">🔓 Login</button>
    </div>
</div>
<!-- CART MODAL -->
<div class="modal-overlay" id="cartModal">
    <div class="modal-box">
        <button class="close-btn" onclick="closeCart()">✕</button>
        <h2>🛒 Cart</h2>
        <div id="cartItems"></div>
        <div class="cart-total-bar" id="cartTotal"></div>
        <button class="checkout-btn" onclick="proceedOrder()">✅ Order করো</button>
    </div>
</div>
<!-- ORDER MODAL -->
<div class="modal-overlay" id="orderModal">
    <div class="modal-box">
        <button class="close-btn" onclick="closeOrder()">✕</button>
        <h2>📦 Order Form</h2>
        <p class="modal-subtitle">তোমার তথ্য দাও</p>
        <div class="order-summary" id="orderSummary"></div>
        <div class="oform-group">
            <label>Name *</label>
            <input type="text" id="oName" placeholder="Your name...">
        </div>
        <div class="oform-group">
            <label>Mobile *</label>
            <input type="tel" id="oPhone" placeholder="01XXXXXXXXX">
        </div>
        <div class="oform-group">
            <label>Address *</label>
            <textarea id="oAddress" rows="2" placeholder="Your address..."></textarea>
        </div>
        <div class="oform-group">
            <label>Note (optional)</label>
            <input type="text" id="oNote" placeholder="Special instructions...">
        </div>
        <div class="order-btns">
            <button class="whatsapp-btn" onclick="sendWhatsApp()">💬 WhatsApp এ Order করো</button>
            <button class="email-btn" onclick="sendEmail()">📧 Email এ Order করো</button>
        </div>
    </div>
</div>
<script>
var WHATSAPP = '8801948082008';
var EMAIL = 'mdantor82008@gmail.com';
var PASS = 'An@T0r#W0rLd$2024!';
var isAdmin = false;
var cart = [];
var products = JSON.parse(localStorage.getItem('aw_products') || 'null') || [
    {id:1,name:'PRODUCT 1',price:500,desc:'Description here.',img:'',emoji:'📦'},
    {id:2,name:'PRODUCT 2',price:1200,desc:'Description here.',img:'',emoji:'💻'},
    {id:3,name:'PRODUCT 3',price:800,desc:'Description here.',img:'',emoji:'🎮'}
];
var nextId = products.length ? Math.max.apply(null, products.map(function(p){return p.id;})) + 1 : 1;
function save() { localStorage.setItem('aw_products', JSON.stringify(products)); }
function render(list) {
    var g = document.getElementById('productGrid');
    g.innerHTML = '';
    if (!list.length) { g.innerHTML = '<p style="text-align:center;color:rgba(255,255,255,0.4);grid-column:1/-1;padding:40px">No products found.</p>'; return; }
    for (var i=0; i<list.length; i++) {
        var p = list[i];
        var img = p.img ? '<img src="'+p.img+'" class="product-img" onerror="this.style.display=\'none\'">' : '<div class="product-img-placeholder">'+(p.emoji||'📦')+'</div>';
        var del = isAdmin ? '<button class="del-btn" onclick="delProduct('+p.id+')">🗑</button>' : '';
        g.innerHTML += '<div class="product-card">'+img+'<div class="product-info"><div class="product-name">'+p.name+'</div><div class="product-desc">'+p.desc+'</div><div class="product-price">৳ '+p.price+'</div><div class="btn-group"><button class="buy-btn" onclick="addToCart('+p.id+')">🛒 Cart</button><button class="order-now-btn" onclick="orderNow('+p.id+')">⚡ Order</button>'+del+'</div></div></div>';
    }
}
function showAdminLogin() { document.getElementById('adminModal').classList.add('active'); setTimeout(function(){document.getElementById('adminPass').focus();},100); }
function closeAdminModal() { document.getElementById('adminModal').classList.remove('active'); document.getElementById('adminPass').value=''; }
function checkAdmin() {
    if (document.getElementById('adminPass').value === PASS) {
        isAdmin = true;
        closeAdminModal();
        document.getElementById('addSection').style.display = 'block';
        document.getElementById('adminBar').innerHTML = '<span class="admin-badge">👑 ADMIN MODE</span><button class="logout-btn" onclick="logoutAdmin()">Logout</button>';
        render(products);
        alert('✅ Admin Login সফল!');
    } else {
        alert('❌ Wrong Password!');
        document.getElementById('adminPass').value = '';
    }
}
function logoutAdmin() {
    isAdmin = false;
    document.getElementById('addSection').style.display = 'none';
    document.getElementById('adminBar').innerHTML = '<button class="admin-login-btn" onclick="showAdminLogin()">🔐 Admin Login</button>';
    render(products);
}
function delProduct(id) {
    if (confirm('Delete this product?')) {
        products = products.filter(function(p){return p.id!==id;});
        save(); render(products);
    }
}
function searchProducts() {
    var q = document.getElementById('searchInput').value.toLowerCase();
    render(products.filter(function(p){return p.name.toLowerCase().indexOf(q)!==-1||p.desc.toLowerCase().indexOf(q)!==-1;}));
}
function addToCart(id) {
    var p = products.filter(function(x){return x.id===id;})[0];
    var e = cart.filter(function(x){return x.id===id;})[0];
    if (e) e.qty++; else cart.push({id:p.id,name:p.name,price:p.price,emoji:p.emoji,qty:1});
    document.getElementById('cartCount').textContent = cart.reduce(function(a,c){return a+c.qty;},0);
    alert('✓ '+p.name+' added to cart!');
}
function openCart() {
    document.getElementById('cartModal').classList.add('active');
    var d = document.getElementById('cartItems'), t = document.getElementById('cartTotal');
    if (!cart.length) { d.innerHTML='<p style="color:rgba(255,255,255,0.4);text-align:center;padding:20px">Cart empty!</p>'; t.textContent=''; return; }
    d.innerHTML = cart.map(function(c){return '<div class="cart-item"><span>'+(c.emoji||'📦')+' '+c.name+' x'+c.qty+'</span><span>৳ '+(c.price*c.qty)+'</span><button class="remove" onclick="removeFromCart('+c.id+')">✕</button></div>';}).join('');
    t.textContent = 'TOTAL: ৳ '+cart.reduce(function(a,c){return a+c.price*c.qty;},0);
}
function removeFromCart(id) {
    cart = cart.filter(function(c){return c.id!==id;});
    document.getElementById('cartCount').textContent = cart.reduce(function(a,c){return a+c.qty;},0);
    openCart();
}
function closeCart() { document.getElementById('cartModal').classList.remove('active'); }
function orderNow(id) {
    var p = products.filter(function(x){return x.id===id;})[0];
    cart = [{id:p.id,name:p.name,price:p.price,emoji:p.emoji,qty:1}];
    document.getElementById('cartCount').textContent = 1;
    proceedOrder();
}
function proceedOrder() {
    if (!cart.length) return;
    closeCart();
    var total = cart.reduce(function(a,c){return a+c.price*c.qty;},0);
    document.getElementById('orderSummary').innerHTML = cart.map(function(c){return '<div class="order-item-row"><span>'+(c.emoji||'📦')+' '+c.name+' x'+c.qty+'</span><span>৳ '+(c.price*c.qty)+'</span></div>';}).join('')+'<div class="order-total">TOTAL: ৳ '+total+'</div>';
    document.getElementById('orderModal').classList.add('active');
}
function closeOrder() { document.getElementById('orderModal').classList.remove('active'); }
function getDetails() {
    var n=document.getElementById('oName').value.trim(), ph=document.getElementById('oPhone').value.trim(), ad=document.getElementById('oAddress').value.trim(), no=document.getElementById('oNote').value.trim();
    if (!n||!ph||!ad) { alert('Name, Mobile & Address required!'); return null; }
    var items='', total=0;
    cart.forEach(function(c){ items+=(c.emoji||'📦')+' '+c.name+' x'+c.qty+' = ৳'+(c.price*c.qty)+'\n'; total+=c.price*c.qty; });
    return {name:n,phone:ph,address:ad,note:no,items:items,total:total};
}
function sendWhatsApp() {
    var d=getDetails(); if(!d) return;
    var msg='🛒 *New Order - ANTOR.WORLD*\n\n👤 Name: '+d.name+'\n📞 Mobile: '+d.phone+'\n📍 Address: '+d.address+'\n\n📦 *Orders:*\n'+d.items+'\n💰 *Total: ৳'+d.total+'*'+(d.note?'\n📝 Note: '+d.note:'');
    window.open('https://wa.me/'+WHATSAPP+'?text='+encodeURIComponent(msg),'_blank');
    clearOrder();
}
function sendEmail() {
    var d=getDetails(); if(!d) return;
    window.location.href='mailto:'+EMAIL+'?subject='+encodeURIComponent('New Order - '+d.name)+'&body='+encodeURIComponent('Name: '+d.name+'\nMobile: '+d.phone+'\nAddress: '+d.address+'\n\n'+d.items+'\nTotal: ৳'+d.total+(d.note?'\nNote: '+d.note:''));
    clearOrder();
}
function clearOrder() {
    cart=[];
    document.getElementById('cartCount').textContent=0;
    ['oName','oPhone','oAddress','oNote'].forEach(function(id){document.getElementById(id).value='';});
    closeOrder();
    alert('✅ Order sent! Thank you!');
}
function addProduct() {
    var n=document.getElementById('pName').value.trim(), pr=parseInt(document.getElementById('pPrice').value), de=document.getElementById('pDesc').value.trim(), im=document.getElementById('pImg').value.trim(), em=document.getElementById('pEmoji').value.trim();
    if (!n||!pr) { alert('Name and price required!'); return; }
    products.push({id:nextId++,name:n,price:pr,desc:de||'No description.',img:im,emoji:em||'📦'});
    save(); render(products);
    ['pName','pPrice','pDesc','pImg','pEmoji'].forEach(function(id){document.getElementById(id).value='';});
    alert('✓ Product added!');
}
render(products);
</script>
</body>
</html>
