<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANTOR.WORLD | Official Store</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        body { background: radial-gradient(circle at top, #1a0633 0%, #050505 100%); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; text-align: center; min-height: 100vh; overflow-x: hidden; }
        header { padding: 40px 10px; }
        .logo { font-size: clamp(2rem, 8vw, 3.5rem); font-weight: 900; background: linear-gradient(to right, #00d2ff, #ff00ff, #00d2ff); background-size: 200% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: shine 3s linear infinite; letter-spacing: 2px; text-transform: uppercase; margin: 0; }
        @keyframes shine { to { background-position: 200% center; } }
        .search-container { margin: 20px auto; width: 90%; max-width: 500px; }
        #searchBox { width: 100%; padding: 12px 20px; border-radius: 50px; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.05); color: white; outline: none; font-size: 16px; box-sizing: border-box; }
        .container { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; padding: 20px; max-width: 1200px; margin: 0 auto; }
        .card { background: rgba(255, 255, 255, 0.03); border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); overflow: hidden; transition: 0.3s; animation: fadeInUp 0.6s ease-out backwards; }
        .card img { width: 100%; height: 280px; object-fit: cover; }
        .info { padding: 15px; text-align: left; }
        .price { color: #ff00ff; font-size: 24px; font-weight: bold; margin: 5px 0; }
        .order-btn { display: block; background: linear-gradient(45deg, #ff4b2b, #ff416c); color: white; text-align: center; padding: 12px; border-radius: 12px; text-decoration: none; font-weight: bold; }
        
        /* Hidden Admin Panel */
        #adminArea { display: none; background: rgba(0,0,0,0.95); padding: 25px; margin: 20px auto; border-radius: 20px; border: 2px solid #ff00ff; max-width: 400px; width: 90%; box-sizing: border-box; }
        .admin-input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; background: #111; color: white; border: 1px solid #333; box-sizing: border-box; }

        .footer { padding: 50px 10px; background: rgba(0,0,0,0.4); margin-top: 40px; position: relative; }
        .c-btn { display: inline-block; padding: 10px 20px; border-radius: 50px; text-decoration: none; color: white; margin: 5px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); font-size: 13px; font-weight: bold; }
        
        /* Secret invisible button */
        #secretBtn { position: absolute; bottom: 0; left: 0; width: 100%; height: 50px; cursor: default; }
    </style>
</head>
<body>

    <header><h1 class="logo">ANTOR.WORLD</h1></header>

    <div class="search-container">
        <input type="text" id="searchBox" placeholder="Search products..." onkeyup="search()">
    </div>

    <div id="adminArea">
        <h3 style="color:#ff00ff">Admin Panel</h3>
        <input type="text" id="pName" class="admin-input" placeholder="Product Name">
        <input type="text" id="pPrice" class="admin-input" placeholder="Price ()">
        <input type="text" id="pImg" class="admin-input" placeholder="Image URL">
        <button onclick="uploadProduct()" style="background:#ff00ff; color:white; width:100%; padding:12px; border:none; border-radius:12px; cursor:pointer; font-weight:bold;">UPLOAD </button>
    </div>

    <div id="loading" style="color:#555; margin: 40px;">Loading...</div>
    <div class="container" id="productList"></div>

    <div class="footer">
        <p style="color:#555; font-size:10px; letter-spacing:2px;">CONTACT INFO</p>
        <a href="tel:01948082008" class="c-btn"> CALL US</a>
        <a href="https://facebook.com/md.antor.16718979" class="c-btn" target="_blank"> FACEBOOK</a>
        <a href="https://wa.me/8801948082008" class="c-btn"> WHATSAPP</a>
        
        <div id="secretBtn" onclick="tripleTap()"></div>
    </div>

    <script>
        //   
        const firebaseConfig = {
            apiKey: "AIzaSyBKYx0oC4xyrj9BOFPhwYZ5yre3eDwNoyU",
            databaseURL: "https://antor-world-default-rtdb.firebaseio.com",
            projectId: "antor-world"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        db.ref('products').on('value', (snap) => {
            document.getElementById('loading').style.display = 'none';
            const list = document.getElementById('productList');
            list.innerHTML = "";
            snap.forEach((child) => {
                const item = child.val();
                list.innerHTML += `<div class="card" data-name="${item.name.toLowerCase()}">
                    <img src="${item.img}" onerror="this.src='https://via.placeholder.com/300'">
                    <div class="info"><h3>${item.name}</h3><div class="price"> ${item.price}</div>
                    <a href="https://wa.me/8801948082008?text=Order:${item.name}" class="order-btn"> ORDER NOW</a></div></div>`;
            });
        });

        function search() {
            let val = document.getElementById('searchBox').value.toLowerCase();
            document.querySelectorAll('.card').forEach(c => {
                c.style.display = c.getAttribute('data-name').includes(val) ? "block" : "none";
            });
        }

        // Secret Triple Tap Logic
        let tapCount = 0;
        let isVerified = false;
        function tripleTap() {
            tapCount++;
            if (tapCount === 3) {
                tapCount = 0; // reset
                let pass = prompt("Enter Secret Key:");
                if(pass === "Antor@99#Shop") {
                    isVerified = true;
                    document.getElementById('adminArea').style.display = 'block';
                    window.scrollTo(0,0);
                } else {
                    alert("Unauthorized Access!");
                }
            }
            // 2 second            
            setTimeout(() => { tapCount = 0; }, 2000);
        }

        function uploadProduct() {
            if(!isVerified) return;
            const name = document.getElementById('pName').value, price = document.getElementById('pPrice').value, img = document.getElementById('pImg').value;
            if(name && price && img) {
                db.ref('products').push({ name, price, img }).then(() => {
                    alert("Live Now!");
                    document.getElementById('pName').value = ""; document.getElementById('pPrice').value = ""; document.getElementById('pImg').value = "";
                });
            }
        }
    </script>
</body>
</html>
